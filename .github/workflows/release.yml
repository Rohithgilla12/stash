name: Release

# Tag a release to build a signed + notarized DMG and publish it as a GitHub Release:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Required repo SECRETS (Settings → Secrets and variables → Actions):
#   DEVID_CERT_P12_BASE64  – your "Developer ID Application" cert+key exported as .p12,
#                            base64-encoded:  base64 -i DeveloperID.p12 | pbcopy
#   DEVID_CERT_PASSWORD    – the password you set when exporting the .p12
#   AC_APPLE_ID            – your Apple ID email (e.g. gillarohith@gmail.com)
#   AC_APP_PASSWORD        – an app-specific password from appleid.apple.com
#   SPARKLE_ED_PRIVATE_KEY – the EdDSA private key from Sparkle's generate_keys -x
#                            (signs the auto-update; public key is in Info.plist)
#   (Team ID 7D2V3RM56T is hard-coded below; change if needed.)

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # to create the GitHub Release

jobs:
  release:
    runs-on: macos-15
    env:
      TEAM_ID: "7D2V3RM56T"
      SIGN_IDENTITY: "Developer ID Application: Rohith Gilla (7D2V3RM56T)"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → git rev-list --count gives a real build number

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm cert.p12

      - name: Compute version + build number
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          # Monotonic build number → Sparkle's sparkle:version, so updates compare correctly.
          echo "BUILD_NUMBER=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Build & sign (hardened runtime)
        working-directory: StashApp
        run: |
          xcodegen generate
          xcodebuild -scheme StashApp -configuration Release \
            -derivedDataPath .build-release build CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD_NUMBER"
          APP=".build-release/Build/Products/Release/StashApp.app"
          bash "$GITHUB_WORKSPACE/scripts/sign-app.sh" "$APP" "$SIGN_IDENTITY"

      - name: Package DMG
        run: |
          APP="StashApp/.build-release/Build/Products/Release/StashApp.app"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/Stash.app"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Stash" -srcfolder "$STAGE" -ov -format UDZO "Stash-$VERSION.dmg"
          echo "DMG=Stash-$VERSION.dmg" >> "$GITHUB_ENV"

      - name: Notarize & staple
        env:
          AC_APPLE_ID: ${{ secrets.AC_APPLE_ID }}
          AC_APP_PASSWORD: ${{ secrets.AC_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "$DMG" \
            --apple-id "$AC_APPLE_ID" --password "$AC_APP_PASSWORD" --team-id "$TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Sign with Sparkle + generate appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          TOOLS="$(mktemp -d)"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/2.9.3/Sparkle-2.9.3.tar.xz" -o "$TOOLS/s.tar.xz"
          tar -xf "$TOOLS/s.tar.xz" -C "$TOOLS"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$TOOLS/key"
          SIG_LINE="$("$TOOLS/bin/sign_update" "$DMG" --ed-key-file "$TOOLS/key")"
          rm -f "$TOOLS/key"
          ED_SIG="$(printf '%s' "$SIG_LINE" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
          LENGTH="$(printf '%s' "$SIG_LINE" | sed -n 's/.*length="\([^"]*\)".*/\1/p')"
          DMG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG}"
          PUB_DATE="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"
          # Release notes (Sparkle renders <description> as HTML):
          #   1. If the tag's annotation message has a body, use it verbatim as the
          #      notes — write bullet lines ("- …") for full, curated control.
          #   2. Otherwise auto-scrape USER-FACING commits: only feat(app)/fix(app)
          #      (release/build/ci/dev/chore/docs machinery excluded), minus any
          #      commit whose message contains [skip-notes].
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          # actions/checkout can leave the tag lightweight (annotation lost), so
          # %(contents:body) would fall through to the COMMIT body — re-fetch the
          # annotated tags first.
          git fetch --tags --force origin >/dev/null 2>&1 || true
          TAG_BODY="$(git tag -l "${GITHUB_REF_NAME}" --format='%(contents:body)')"
          # Curated notes = ONLY explicit bullet lines ("- …"), so commit trailers
          # (e.g. Claude-Session:) or a stray commit body can never leak in.
          NOTE_ITEMS="$(printf '%s\n' "$TAG_BODY" \
            | grep -E '^[[:space:]]*[-*•][[:space:]]+' \
            | sed -E 's/^[[:space:]]*[-*•][[:space:]]+//' \
            | esc | sed 's|^|<li>|; s|$|</li>|')"
          if [ -z "$NOTE_ITEMS" ]; then
            PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
            RANGE="${GITHUB_REF_NAME}"; [ -n "$PREV_TAG" ] && RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            NOTE_ITEMS="$(git log "$RANGE" --invert-grep --grep='\[skip-notes\]' --pretty=format:'%s' \
              | grep -E '^(feat|fix)\(app\): ' \
              | sed -E 's/^(feat|fix)\(app\): //' \
              | esc | sed 's|^|<li>|; s|$|</li>|')"
          fi
          [ -z "$NOTE_ITEMS" ] && NOTE_ITEMS="<li>Maintenance and improvements.</li>"
          NOTES_HTML="<h2>What's new in ${VERSION}</h2><ul>${NOTE_ITEMS}</ul><p><a href=\"https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}\">Full changelog on GitHub</a></p>"
          cat > appcast.xml <<EOF
          <?xml version="1.0" standalone="yes"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Stash</title>
              <link>https://github.com/${GITHUB_REPOSITORY}</link>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:version>${BUILD_NUMBER}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <description><![CDATA[${NOTES_HTML}]]></description>
                <enclosure url="${DMG_URL}" sparkle:edSignature="${ED_SIG}" length="${LENGTH}" type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF
          echo "--- appcast.xml ---"; cat appcast.xml

      - name: Stable-named DMG copy
        run: cp "$DMG" Stash.dmg

      - name: Publish GitHub Release (DMG + appcast)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.DMG }}
            appcast.xml
            Stash.dmg
          generate_release_notes: true
