name: StashApp
options:
  bundleIdPrefix: co.fusang.stash
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  StashApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/StashApp
    info:
      path: Sources/StashApp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Stash
        NSHumanReadableCopyright: ""
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        ENABLE_APP_SANDBOX: NO
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: co.fusang.stash.app
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: GRDB
  StashAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StashAppTests
    dependencies:
      - target: StashApp
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.fusang.stash.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  StashApp:
    build:
      targets:
        StashApp: all
        StashAppTests: [test]
    run:
      config: Debug
    test:
      targets:
        - StashAppTests
