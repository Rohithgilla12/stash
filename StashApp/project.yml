name: StashApp
options:
  bundleIdPrefix: com.rohithgilla.stash
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  StashApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/StashApp
    info:
      path: Sources/StashApp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Stash
        NSHumanReadableCopyright: ""
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: com.rohithgilla.stash.url
            CFBundleURLSchemes: [stash]
        SUFeedURL: https://github.com/Rohithgilla12/stash/releases/latest/download/appcast.xml
        SUPublicEDKey: ZdBs8XYY8W59JR5tzS+Kv00LPyqW8+jfhKydJ3rDEag=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    settings:
      base:
        ENABLE_APP_SANDBOX: NO
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.rohithgilla.stash.app
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GRDB
      - package: Sparkle
  StashAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StashAppTests
    dependencies:
      - target: StashApp
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rohithgilla.stash.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  StashApp:
    build:
      targets:
        StashApp: all
        StashAppTests: [test]
    run:
      config: Debug
    test:
      targets:
        - StashAppTests
